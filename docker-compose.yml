version: '3.8'

services:
  # --- INFRAESTRUCTURA DE DONNEES (Part 1) ---
  postgres:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_DB: mlflow_db        # La première base créée par défaut
      POSTGRES_USER: mlflow_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # Le port 5433 sur votre PC pointe vers le port 5432 à l'intérieur du conteneur.
    # Utile si vous avez déjà une instance PostgreSQL locale sur le port 5432.
    ports:
      - "0.0.0.0:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # ON MONTE LE SCRIPT D'INITIALISATION ICI :
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_service
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      # Optionnel : fixe le mode serveur pour éviter les soucis de session
      PGADMIN_CONFIG_SERVER_MODE: 'True'
    ports:
      - "0.0.0.0:8088:80" # Force l'écoute sur toutes les interfaces réseau
    depends_on:
      - postgres

  # --- TRACKING SERVER (Fusionado: Backend Postgres + Volumen de Artefactos) ---
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.16.0
    depends_on: [postgres]
    # Modificamos el comando para instalar psycopg2-binary antes de arrancar
    environment:
      # Inyectamos la variable del .env al contenedor
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    entrypoint: >
      /bin/sh -c "
      pip install psycopg2-binary &&
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://mlflow_user:$$POSTGRES_PASSWORD@postgres:5432/mlflow_db
      --default-artifact-root /mlflow/artifacts
      "
    ports: ["5001:5000"]
    volumes: ["mlflow_artifacts:/mlflow/artifacts"]
    restart: unless-stopped

  #api:
  #  build: .
  #  depends_on: [mlflow]
  #  # Votre API de scoring (FastAPI) sera disponible sur http://localhost:8001.
  #  ports: ["0.0.0.0:8001:8000"]
  #  environment:
  #    MLFLOW_TRACKING_URI: http://mlflow:5000
  #    MODEL_NAME:          credit-scoring-model
  #    MODEL_STAGE:         Production
  #  env_file: [.env]

  # --- API DE SCORING (Actualizada con Multi-stage y Healthcheck) ---
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime # Stage de producción definido en tu Dockerfile
    container_name: m7_api
    depends_on:
      - mlflow
    ports:
      - "8001:8000" # Mantenemos el acceso externo en 8001
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MODEL_BACKEND=${MODEL_BACKEND:-onnx}
      - SEUIL_DECISION=${SEUIL_DECISION:-0.35}
      - MODEL_NAME=credit-scoring-model
    env_file:
      - .env
    volumes:
      - ./predictions.jsonl:/app/predictions.jsonl # Para compartir logs con el dashboard
      - ./monitoring:/app/monitoring
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # --- DASHBOARD STREAMLIT (Nuevo Servicio) ---
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: m7_dashboard
    environment:
      - STREAMLIT_APP=monitoring/dashboard.py
      - API_URL=http://api:8000
    ports:
      - "8501:8501" # Acceso UI Dashboard
    volumes:
      - ./predictions.jsonl:/app/predictions.jsonl
      - ./monitoring:/app/monitoring
      - ./model_artifact:/app/model_artifact
    depends_on:
      api:
        condition: service_healthy # Solo arranca si la API responde /health
    restart: unless-stopped

  simulator:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: m7_simulator
    ports:
      - "8502:8502"
    volumes:
      - ./predictions.jsonl:/app/predictions.jsonl
      - ./monitoring:/app/monitoring
      - ./model_artifact:/app/model_artifact
    environment:
      - STREAMLIT_APP=monitoring/simulator.py
      - API_URL=http://api:8000    # en Docker los servicios se llaman por nombre, no localhost
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  mlflow_artifacts: