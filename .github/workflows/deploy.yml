name: Deploy to Hugging Face

on:
  push:
    branches: [main]

env: 
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Prepare HuggingFace deployment folder
        run: |
          mkdir -p hf-deploy

          # Código fuente de la API
          cp -r src/              hf-deploy/src/
          # El modelo ya entrenado (sin MLflow, sin experimentos)
          cp -r model_artifact/   hf-deploy/model_artifact/
          cp -r monitoring/       hf-deploy/monitoring/

          # Dependencias
          cp requirements.txt     hf-deploy/requirements.txt
          
          # Dockerfile que arranca uvicorn en puerto 7860
          cp Dockerfile           hf-deploy/Dockerfile
          
          # App que arranca la aPI y la interface simulator para la inferencia 
          cp app.py               hf-deploy/app.py

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.TOKEN_HUGGINGFACE_CI_CD_DEPLOY }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

          cd hf-deploy
          git init
          git checkout --orphan main
          git add -A
          git commit -m "Deploy API m7_ocr - ${{ github.sha }}"

          # ⚠️ Cambia 'mombasstic/proyecto8-app' por tu Space real
          git remote add hf https://mombasstic:$HF_TOKEN@huggingface.co/spaces/mombasstic/pret_a_depenser
          git push --force hf main