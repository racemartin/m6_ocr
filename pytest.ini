# ==============================================================================
# CONFIGURATION PYTEST : PRÊT À DÉPENSER — HOME CREDIT DEFAULT RISK
# Phase 3 : Entraînement des modèles de classification + MLflow tracking
# ==============================================================================
[pytest]

# -- Variables d'environnement pour les tests --------------------------------
env =
    MODEL_BACKEND=onnx
    SEUIL_DECISION=0.35

# ------------------------------------------------------------------------------
# MARQUEURS : CLASSIFICATION DES TESTS
#
# Répartition réelle Phase 3 (124 tests) :
#   unit        → ~80 tests  (modèles, métriques, config, sauvegarde)
#   integration → ~44 tests  (MLflow local, SQLite, pipeline end-to-end)
#   e2e         → 0 tests    (Phase 5 — scoring Kaggle)
# ------------------------------------------------------------------------------
markers =
    # ── Niveau 1 : Tests unitaires (≈ 65%) ────────────────────────────────────
    unit:               Tests unitaires — rapides, isolés, sans dépendances externes

    # ── Niveau 2 : Tests d'intégration (≈ 35%) ────────────────────────────────
    integration:        Tests d'intégration — mocks ou ressources légères (SQLite, MLflow local)
    integration_db:     Tests d'intégration DB — SQLite en mémoire (remplace PostgreSQL)

    # ── Niveau 3 : Tests E2E (Phase 5 — non actif en Phase 3) ─────────────────
    e2e:                Tests bout en bout — infrastructure complète (DB + MLflow + BentoML)

    # ── Dépendances d'infrastructure (skip automatique si absente) ─────────────
    requires_db:        Nécessite PostgreSQL réel (v_features_engineering disponible)
    requires_mlflow:    Nécessite le serveur MLflow sur :5000 ou :5001
    requires_all_services: Nécessite DB + MLflow + BentoML simultanément

    # ── Performance ────────────────────────────────────────────────────────────
    slow:               Tests lents > 1s (CV StratifiedKFold, entraînements réels)
    fast:               Tests rapides < 100ms (config, structure, métriques mock)

    # ── Couche hexagonale ──────────────────────────────────────────────────────
    domain:             Règles métier (F2 > F1, déséquilibre, overfitting seuil)
    application:        Cas d'utilisation (split, sauvegarde, comparaison champion)
    adapter_secondary:  Adaptateurs secondaires (PostgreSQL, MLflow tracking)
    infrastructure:     Infrastructure (MLflowConfig, serialisation joblib)

    # ── Phase projet ───────────────────────────────────────────────────────────
    phase3:             Tests spécifiques Phase 3 (entraînement modèles)
    phase4:             Tests spécifiques Phase 4 (optimisation hyperparamètres)
    phase5:             Tests spécifiques Phase 5 (scoring + API BentoML)

# ------------------------------------------------------------------------------
# TEST DISCOVERY
# ------------------------------------------------------------------------------
testpaths        = tests src
python_files     = test_*.py
python_classes   = Test*
python_functions = test_*

# ------------------------------------------------------------------------------
# OUTPUT ET OPTIONS PAR DÉFAUT
#
# Commandes utiles Phase 3 :
#   pytest tests/ -v                              → tout
#   pytest tests/ -v -m unit                     → unitaires seuls (~80 tests, < 20s)
#   pytest tests/ -v -m integration              → intégration (~44 tests)
#   pytest tests/ -v -m "unit and fast"          → rapides uniquement (CI/CD)
#   pytest tests/ -v -m "not slow"               → exclure les lents
#   pytest tests/ -v -m domain                   → règles métier uniquement
#   pytest tests/test_phase3_models.py   -v      → modèles sklearn
#   pytest tests/test_phase3_mlflow.py   -v      → MLflow (fichier local)
#   pytest tests/test_phase3_database.py -v      → DB (SQLite en mémoire)
#   pytest tests/test_phase3_pipeline.py -v      → pipeline intégration
# ------------------------------------------------------------------------------
addopts =
    -v
    --strict-markers
    --tb=short
    --color=yes
    --durations=10
    --cov=src
    --cov-report=term-missing
    --cov-report=html:reports/coverage_html
    --cov-fail-under=80
# ------------------------------------------------------------------------------
# ASYNCIO
# (Pas de code async en Phase 3 — conservé pour Phase 5 API BentoML/FastAPI)
# ------------------------------------------------------------------------------
asyncio_mode     = auto

# ------------------------------------------------------------------------------
# LOGGING
# ------------------------------------------------------------------------------
log_cli          = false
log_cli_level    = INFO
log_cli_format   = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# ------------------------------------------------------------------------------
# FILTRES D'AVERTISSEMENT
# ------------------------------------------------------------------------------
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:lightgbm
    ignore::UserWarning:xgboost
    ignore::sklearn.exceptions.ConvergenceWarning